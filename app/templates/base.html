<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Flask Prototype{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container d-flex flex-column align-items-start py-2">
      <div class="d-flex align-items-center gap-2">
        <button class="navbar-toggler d-flex align-items-center justify-content-center border-0 shadow-none"
          type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu"
          aria-label="Open navigation menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand mb-0" href="/">FlaskPrototypeUI</a>
      </div>
      <div class="mt-1 w-100">
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="sidebarMenuLabel">Navigation</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      
      <nav class="nav flex-column gap-2">
        <a class="nav-link text-white" href="/">Dashboard</a>
        <a class="nav-link text-white-50" href="#">Reports</a>
        <a class="nav-link text-white-50" href="#">Settings</a>
        <a class="nav-link text-white-50" href="#">Support</a>
      </nav>
    </div>
  </div>
  
  <main class="container py-4">
    {% block breadcrumbs %}{% endblock %}
    <header class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="h4 mb-0">{{ page_title|default('Flask Prototype') }}</h1>
        <p class="text-muted mb-0">Starter interface powered by Bootstrap 5</p>
      </div>
    </header>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" crossorigin="anonymous"></script>
</body>

</html>
